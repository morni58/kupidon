<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CupidBot — прототип</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Onest', 'sans-serif'] },
        colors: {
          brand: '#FF00FF', brandpink: '#FF66CC', ink: '#0F0F13',
          gold: '#FFD700', emerald: '#10B981', tgblue: '#3B82F6', danger: '#EF4444',
        },
      },
    },
  };
</script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; font-family: 'Onest', sans-serif; }
  body {
    background: #1a1a1f;
    background-image: radial-gradient(circle at 20% 20%, #2a1030, #131316 60%);
    overflow: hidden;
  }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  .noscroll { -ms-overflow-style: none; scrollbar-width: none; }
  .noscroll::-webkit-scrollbar { display: none; }

  .dotbg { background-color: #FAFAFC; background-image: radial-gradient(circle, #e5e7eb 1px, transparent 1px); background-size: 24px 24px; }

  @keyframes confettiFall { to { transform: translateY(900px) rotate(720deg); opacity: 0.9; } }
  @keyframes toastIn { from { transform: translateY(-12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes slideInR { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideInL { from { transform: translateX(-40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes popIn { 0% { transform: scale(0.7); opacity: 0; } 60% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes pulseRing { 0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); } 70% { box-shadow: 0 0 0 18px rgba(59,130,246,0); } 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  /* --- atmospheric mesh drift (slow, expensive feel) --- */
  @keyframes meshA { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(8%,6%) scale(1.15); } 66% { transform: translate(-6%,4%) scale(0.95); } }
  @keyframes meshB { 0%,100% { transform: translate(0,0) scale(1.05); } 50% { transform: translate(-10%,-8%) scale(1.2); } }
  @keyframes meshC { 0%,100% { transform: translate(0,0) scale(1); } 40% { transform: translate(6%,-7%) scale(1.1); } 75% { transform: translate(-8%,5%) scale(1.05); } }
  .mesh-a { animation: meshA 24s ease-in-out infinite; }
  .mesh-b { animation: meshB 30s ease-in-out infinite; }
  .mesh-c { animation: meshC 27s ease-in-out infinite; }
  /* film grain */
  @keyframes grainShift { 0%{transform:translate(0,0)} 10%{transform:translate(-3%,-2%)} 30%{transform:translate(2%,-4%)} 50%{transform:translate(-2%,3%)} 70%{transform:translate(3%,2%)} 90%{transform:translate(-3%,-1%)} 100%{transform:translate(0,0)} }
  .grain { animation: grainShift 1.2s steps(4) infinite; }
  /* gloss sweep for gold */
  @keyframes goldSweep { 0% { transform: translateX(-120%) skewX(-18deg); } 100% { transform: translateX(220%) skewX(-18deg); } }
  /* soft pulse glow (18+) */
  @keyframes glowPulse { 0%,100% { opacity: 0.35; } 50% { opacity: 0.7; } }
  /* equalizer bars */
  @keyframes eq { 0%,100% { height: 30%; } 50% { height: 100%; } }
  /* ring count draw handled in JS via stroke-dashoffset */
  .anim-slideR { animation: slideInR .35s cubic-bezier(.22,1,.36,1); }
  .anim-slideL { animation: slideInL .35s cubic-bezier(.22,1,.36,1); }
  .anim-pop { animation: popIn .4s cubic-bezier(.34,1.56,.64,1); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .anim-fade { animation: fadeUp .28s ease both; }
  .floaty { animation: floaty 3s ease-in-out infinite; }

  /* phone frame */
  #phone {
    position: relative; width: 390px; height: 844px;
    background: #000; border-radius: 3rem; border: 8px solid #111;
    box-shadow: 0 50px 100px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05);
    overflow: hidden; flex-shrink: 0;
  }
  #screen {
    position: absolute; inset: 0; border-radius: 2.4rem; overflow: hidden;
    --sat: 44px; --sab: 22px;
  }
  #root { height: 100%; }
  /* notch */
  #notch {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 150px; height: 30px; background: #000; border-radius: 0 0 18px 18px; z-index: 60;
  }
  .safe-top { padding-top: var(--sat); }
  .safe-bottom { padding-bottom: var(--sab); }
  .screen-pad { padding-left: 20px; padding-right: 20px; }
</style>
</head>
<body>
  <div id="stage">
    <div id="phone">
      <div id="notch"></div>
      <div id="screen"><div id="root"></div></div>
    </div>
  </div>
  <div id="dock-root"></div>

  <script>
    // scale phone to fit viewport
    function fit() {
      const stage = document.getElementById('stage');
      const phone = document.getElementById('phone');
      const pad = 24;
      const sx = (window.innerWidth - pad) / 390;
      const sy = (window.innerHeight - pad) / 844;
      const s = Math.min(sx, sy, 1.05);
      phone.style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fit);
    fit();
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/ui.jsx"></script>
  <script type="text/babel" src="src/fx.jsx"></script>
  <script type="text/babel" src="src/onboarding.jsx"></script>
  <script type="text/babel" src="src/feed.jsx"></script>
  <script type="text/babel" src="src/profile.jsx"></script>
  <script type="text/babel" src="src/social.jsx"></script>
  <script type="text/babel" src="src/extra.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
