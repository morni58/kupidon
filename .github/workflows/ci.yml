name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      BOT_TOKEN: "123:test"
      DATABASE_URL: "postgresql+asyncpg://x:x@localhost/x"
      JWT_SECRET: "ci_secret_ci_secret_ci_secret_32chars"
      REDIS_URL: "redis://localhost:6379/0"
      ENVIRONMENT: "test"
      GEOCODER_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install
      - name: Build
        run: npm run build
